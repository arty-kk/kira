cat >docker-compose.yml<< EOF
services:

  db:
    image: postgres:15
    container_name: galaxybee-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -h db -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: galaxybee-redis
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--appendfsync", "no",
        "--maxmemory", "2gb",
        "--maxmemory-policy", "allkeys-lru"
      ]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: galaxybee-pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_ADDRESS: "0.0.0.0"
    ports:
      - "5050:80"

  bot:
    build: .
    container_name: galaxybee-bot
    restart: unless-stopped
    env_file: .env
    environment:
      ENABLE_SCHEDULER: "true"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CERTS_DIR: "/certs"
      USE_SELF_SIGNED_CERT: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/certs:ro
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: ["main.py"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8443/healthz >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    container_name: galaxybee-worker
    restart: always
    env_file: .env
    environment:
      ENABLE_SCHEDULER: "false"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_CONCURRENCY: "16"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command:
      - celery
      - "-A"
      - app.tasks.celery_app.celery
      - worker
      - --loglevel=info
      - --pool=gevent
      - --concurrency=16
      - --prefetch-multiplier=1
    healthcheck:
      test: ["CMD-SHELL", "echo OK"]
      interval: 30s
      timeout: 5s
      retries: 1

volumes:
  db_data:
  redis_data:
EOF