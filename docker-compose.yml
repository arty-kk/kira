# Boolean env vars accept 1/true/yes/on and 0/false/no/off (case-insensitive).
services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    command: [
      "postgres",
      "-c","statement_timeout=30s",
      "-c","lock_timeout=1s",
      "-c","idle_in_transaction_session_timeout=60s",
      "-c","log_min_duration_statement=200ms",
      "-c","log_lock_waits=on",
      "-c","deadlock_timeout=1s",
      "-c","tcp_keepalives_idle=30",
      "-c","tcp_keepalives_interval=10",
      "-c","tcp_keepalives_count=3"
    ]
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis_kv:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      - >
        REDIS_ARGS=--appendonly yes
        --appendfsync everysec
        --no-appendfsync-on-rewrite yes
        --auto-aof-rewrite-percentage 100
        --auto-aof-rewrite-min-size 64mb
        --maxmemory 5gb
        --maxmemory-policy volatile-lru
        --requirepass ${REDIS_PASSWORD}
        --stop-writes-on-bgsave-error no
    command: ["sh","-lc","redis-server $${REDIS_ARGS}"]
    volumes:
      - redis_kv_data:/data
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis_vec:
    image: redis/redis-stack-server:7.2.0-v14
    restart: unless-stopped
    env_file: .env
    environment:
      - >
        REDIS_ARGS=--appendonly no
        --save 3600 1
        --maxmemory 15gb
        --maxmemory-policy noeviction
        --requirepass ${REDIS_PASSWORD}
        --stop-writes-on-bgsave-error no
    command: ["sh","-lc","exec redis-stack-server $${REDIS_ARGS}"]
    volumes:
      - redis_vec_data:/var/lib/redis-stack
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.6
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_ADDRESS: "0.0.0.0"
      PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: "False"
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/misc/ping >/dev/null"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 10

  precompute-embeddings:
    build: .
    restart: "no"
    env_file: .env
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
    volumes:
      - app_data:/app/data
    command: [
      "python",
      "scripts/precompute_embeddings.py",
      "--kb-file",
      "app/services/responder/rag/knowledge_on.json",
      "--out-file",
      "/app/data/embeddings/knowledge_embedded_${EMBEDDING_MODEL:-text-embedding-3-large}.json"
    ]

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    init: true
    environment:
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis_kv:6379/0
      REDIS_URL_QUEUE:   redis://:${REDIS_PASSWORD}@redis_kv:6379/1
      REDIS_URL_VECTOR:  redis://:${REDIS_PASSWORD}@redis_vec:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis_kv:6379/2
      QUEUE_KEY: "queue:chat"
      ENABLE_SCHEDULER: "true"
      CERTS_DIR: "/certs"
      USE_SELF_SIGNED_CERT: "true"
      DIALOGS_DIR: "/data/dialogs"
      DB_APP_NAME: "bot-main"
      RUN_API: "false"
      RUN_BOT: "true"
      WEBHOOK_HOST: "0.0.0.0"
      WEBHOOK_PORT: "8443" # If running API and webhook together, use different ports.
    depends_on:
      redis_kv:
        condition: service_healthy
      redis_vec:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      precompute-embeddings:
        condition: service_completed_successfully
    volumes:
      - ./certs:/certs:ro
      - ./dialogs:/data/dialogs
      - app_data:/app/data
    ports:
      - "8443:8443"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    command: ["python", "-u", "main.py"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    init: true
    environment:
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis_kv:6379/0
      REDIS_URL_QUEUE:   redis://:${REDIS_PASSWORD}@redis_kv:6379/1
      REDIS_URL_VECTOR:  redis://:${REDIS_PASSWORD}@redis_vec:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis_kv:6379/2
      ENABLE_SCHEDULER: "false"
      RUN_BOT: "false"
      RUN_API: "true"
      CERTS_DIR: "/certs"
      USE_SELF_SIGNED_CERT: "true"
      API_QUEUE_KEY: "queue:api"
      API_CALL_TIMEOUT_SEC: "135"
      REDIS_QUEUE_SOCKET_TIMEOUT: "140"
      DIALOGS_DIR: "/data/dialogs"
      DB_APP_NAME: "api"
      API_HOST: "0.0.0.0"
      API_PORT: "8000" # If running API and webhook together, use different ports.
    depends_on:
      redis_kv:
        condition: service_healthy
      redis_vec:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      precompute-embeddings:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./certs:/certs:ro
      - ./dialogs:/data/dialogs
      - app_data:/app/data
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    command: ["python", "-u", "main.py"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  migrate:
    build: .
    restart: "no"
    env_file: .env
    init: true
    environment:
      DB_APP_NAME: "migrations"
      PYTHONPATH: "/app"
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]

  worker-tasks:
    build: .
    restart: unless-stopped
    env_file: .env
    init: true
    # Queue/concurrency/prefetch/pool/loglevel are configurable via CELERY_DEFAULT_QUEUE and CELERY_TASKS_* without compose edits.
    environment:
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis_kv:6379/0
      REDIS_URL_QUEUE:   redis://:${REDIS_PASSWORD}@redis_kv:6379/1
      REDIS_URL_VECTOR:  redis://:${REDIS_PASSWORD}@redis_vec:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis_kv:6379/2
      CELERY_DEFAULT_QUEUE: ${CELERY_DEFAULT_QUEUE:-celery}
      CELERY_TASKS_CONCURRENCY: ${CELERY_TASKS_CONCURRENCY:-10}
      CELERY_TASKS_PREFETCH: ${CELERY_TASKS_PREFETCH:-1}
      CELERY_TASKS_POOL: ${CELERY_TASKS_POOL:-threads}
      CELERY_TASKS_LOGLEVEL: ${CELERY_TASKS_LOGLEVEL:-info}
      RUN_BOT: "false"
      ENABLE_SCHEDULER: "false"
      DIALOGS_DIR: "/data/dialogs"
      DB_APP_NAME: "worker-tasks"
    volumes:
      - ./dialogs:/data/dialogs
      - app_data:/app/data
    depends_on:
      redis_kv:
        condition: service_healthy
      redis_vec:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      precompute-embeddings:
        condition: service_completed_successfully
    command:
      - celery
      - "-A"
      - app.tasks.celery_app.celery
      - worker
      - --loglevel=${CELERY_TASKS_LOGLEVEL:-info}
      - --pool=${CELERY_TASKS_POOL:-threads}
      - --concurrency=${CELERY_TASKS_CONCURRENCY:-10}
      - --prefetch-multiplier=${CELERY_TASKS_PREFETCH:-1}
      - -Q
      - ${CELERY_DEFAULT_QUEUE:-celery}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    stop_signal: SIGTERM
    stop_grace_period: 180s
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery worker"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  worker-moderation:
    build: .
    restart: unless-stopped
    env_file: .env
    init: true
    environment:
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis_kv:6379/0
      REDIS_URL_QUEUE:   redis://:${REDIS_PASSWORD}@redis_kv:6379/1
      REDIS_URL_VECTOR:  redis://:${REDIS_PASSWORD}@redis_vec:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis_kv:6379/2
      RUN_BOT: "false"
      ENABLE_SCHEDULER: "false"
      DIALOGS_DIR: "/data/dialogs"
      DB_APP_NAME: "worker-moderation"
      CELERY_MODERATION_QUEUE: ${CELERY_MODERATION_QUEUE:-queue_moderation}
      CELERY_MODERATION_CONCURRENCY: ${CELERY_MODERATION_CONCURRENCY:-2}
      CELERY_MODERATION_PREFETCH: ${CELERY_MODERATION_PREFETCH:-1}
    volumes:
      - ./dialogs:/data/dialogs
      - app_data:/app/data
    depends_on:
      redis_kv:
        condition: service_healthy
      redis_vec:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      precompute-embeddings:
        condition: service_completed_successfully
    command:
      - celery
      - "-A"
      - app.tasks.celery_app.celery
      - worker
      - --loglevel=info
      - --pool=threads
      - -Q
      - ${CELERY_MODERATION_QUEUE:-queue_moderation}
      - --concurrency=${CELERY_MODERATION_CONCURRENCY:-2}
      - --prefetch-multiplier=${CELERY_MODERATION_PREFETCH:-1}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    stop_signal: SIGTERM
    stop_grace_period: 180s
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery worker"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  worker-media:
    build: .
    restart: unless-stopped
    env_file: .env
    init: true
    environment:
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis_kv:6379/0
      REDIS_URL_QUEUE:   redis://:${REDIS_PASSWORD}@redis_kv:6379/1
      REDIS_URL_VECTOR:  redis://:${REDIS_PASSWORD}@redis_vec:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis_kv:6379/2
      RUN_BOT: "false"
      ENABLE_SCHEDULER: "false"
      DIALOGS_DIR: "/data/dialogs"
      DB_APP_NAME: "worker-media"
      CELERY_MEDIA_QUEUE: ${CELERY_MEDIA_QUEUE:-queue_media}
      CELERY_MEDIA_CONCURRENCY: ${CELERY_MEDIA_CONCURRENCY:-2}
      CELERY_MEDIA_PREFETCH: ${CELERY_MEDIA_PREFETCH:-1}
    volumes:
      - ./dialogs:/data/dialogs
      - app_data:/app/data
    depends_on:
      redis_kv:
        condition: service_healthy
      redis_vec:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      precompute-embeddings:
        condition: service_completed_successfully
    command:
      - celery
      - "-A"
      - app.tasks.celery_app.celery
      - worker
      - --loglevel=info
      - --pool=threads
      - -Q
      - ${CELERY_MEDIA_QUEUE:-queue_media}
      - --concurrency=${CELERY_MEDIA_CONCURRENCY:-2}
      - --prefetch-multiplier=${CELERY_MEDIA_PREFETCH:-1}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    stop_signal: SIGTERM
    stop_grace_period: 180s
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery worker"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  worker-queue:
    build: .
    restart: unless-stopped
    env_file: .env
    init: true
    environment:
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis_kv:6379/0
      REDIS_URL_QUEUE:   redis://:${REDIS_PASSWORD}@redis_kv:6379/1
      REDIS_URL_VECTOR:  redis://:${REDIS_PASSWORD}@redis_vec:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis_kv:6379/2
      RUN_BOT: "false"
      QUEUE_KEY: "queue:chat"
      DIALOGS_DIR: "/data/dialogs"
      DB_APP_NAME: "worker-queue"
    volumes:
      - ./dialogs:/data/dialogs
      - app_data:/app/data  
    depends_on:
      redis_kv:
        condition: service_healthy
      redis_vec:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      precompute-embeddings:
        condition: service_completed_successfully
    entrypoint: ["python", "-u", "-m", "app.tasks.queue_worker"]
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    stop_signal: SIGINT
    stop_grace_period: 180s
    healthcheck:
      test: ["CMD", "pgrep", "-f", "app.tasks.queue_worker"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  worker-api:
    build: .
    restart: unless-stopped
    env_file: .env
    init: true
    environment:
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis_kv:6379/0
      REDIS_URL_QUEUE:   redis://:${REDIS_PASSWORD}@redis_kv:6379/1
      REDIS_URL_VECTOR:  redis://:${REDIS_PASSWORD}@redis_vec:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis_kv:6379/2
      RUN_BOT: "false"
      API_QUEUE_KEY: "queue:api"
      API_CALL_TIMEOUT_SEC: "135"
      REDIS_QUEUE_SOCKET_TIMEOUT: "140"
      DB_APP_NAME: "worker-api"
      API_JOB_TTL_SEC: "240"
      API_RESULT_TTL_SEC: "600"
      API_WORKER_MAX_INFLIGHT: "128"
      API_RESPOND_TIMEOUT_SEC: "120"
      API_PROCESSING_SWEEP_BATCH: "200"
    volumes:
      - ./dialogs:/data/dialogs
      - app_data:/app/data
    depends_on:
      redis_kv:
        condition: service_healthy
      redis_vec:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      precompute-embeddings:
        condition: service_completed_successfully
    entrypoint: ["python", "-u", "-m", "app.tasks.api_worker"]
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    stop_signal: SIGTERM
    stop_grace_period: 180s
    healthcheck:
      test: ["CMD", "pgrep", "-f", "app.tasks.api_worker"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  db_data:
  redis_kv_data:
  redis_vec_data:
  pgadmin_data:
  app_data:
