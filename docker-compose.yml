cat >docker-compose.yml<< 'EOF'
services:

  db:
    image: postgres:15
    container_name: db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    command: [
      "postgres",
      "-c","statement_timeout=30s",
      "-c","idle_in_transaction_session_timeout=60s"
    ]
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -h db -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis/redis-stack-server:7.2.0-v9
    container_name: redis
    restart: unless-stopped
    env_file: .env
    environment:
      - "REDIS_ARGS=--appendonly yes --appendfsync no --maxmemory 4gb --maxmemory-policy allkeys-lru"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.6
    container_name: pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_ADDRESS: "0.0.0.0"
      PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: "False"
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/misc/ping"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 10

  bot:
    build: .
    container_name: bot-main
    restart: unless-stopped
    env_file: .env
    environment:
      ENABLE_SCHEDULER: "true"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CERTS_DIR: "/certs"
      USE_SELF_SIGNED_CERT: "true"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/certs:ro
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: ["main.py"]
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost:8443/healthz >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker-tasks:
    build: .
    container_name: worker-tasks
    restart: always
    env_file: .env
    environment:
      ENABLE_SCHEDULER: "false"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_CONCURRENCY: "16"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command:
      - celery
      - "-A"
      - app.tasks.celery_app.celery
      - worker
      - --loglevel=info
      - --pool=threads
      - --concurrency=16
      - --prefetch-multiplier=1
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery worker"]
      interval: 30s
      timeout: 5s
      retries: 1

  worker-queue:
    build: .
    container_name: worker-queue
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL_QUEUE: "redis://redis:6379/0"
      QUEUE_KEY: "queue:chat"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    entrypoint: ["python", "-u", "-m", "app.tasks.queue_worker"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "app.tasks.queue_worker"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  redis_data:
  pgadmin_data:
EOF