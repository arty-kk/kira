name: 🚀 Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_DIR: Synchatica

    steps:
    - uses: actions/checkout@v4

    # 1) Поднимаем ssh-agent с приватным ключом
    - name: Add SSH key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

    # 2) Кэшируем ключ хоста
    - name: Add server host key to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    # 3) Rsync
    - name: Rsync code to server
      run: |
        rsync -az --delete \
          --exclude='.git/' \
          ./ \
          "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/${PROJECT_DIR}/"

    # 4) Команды на сервере (appleboy/ssh-action делает StrictHostKeyChecking=no по умолчанию,
    #    но оставляем параметр явно для ясности)
    - name: Build venv & reload via PM2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e
          cd ~/${PROJECT_DIR}
          rm -rf venv
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt
          pm2 startOrReload ecosystem.config.js --update-env
          pm2 save
        ssh-options: "-o StrictHostKeyChecking=no"   # ← чтобы вторая сессия не упала, если ключ вдруг не сохранился
