name: 🚀 Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Copy files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "./"
          target: "/var/www/Synchatica"
          rm: true
          exclude: |
            venv/**
            .git*
            .github/*

      - name: Rebuild virtualenv & install dependencies
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/Synchatica
            # Удаляем старое виртуальное окружение
            rm -rf venv
            # Создаём новое
            python3 -m venv venv
            source venv/bin/activate
            # Устанавливаем зависимости
            pip install --upgrade pip
            pip install -r requirements.txt

      - name: Restart app via pm2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/Synchatica
            source venv/bin/activate
            # Перезапускаем или стартуем сервис
            pm2 restart synchatica || pm2 start main.py \
              --name synchatica \
              --interpreter python3 \
              --cwd /var/www/Synchatica
            pm2 save
