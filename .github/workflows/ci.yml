name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff pyright
      - name: Compile Python files
        run: python -m compileall -q .
      - name: Run pytest
        run: |
          pytest
          status=$?
          if [ $status -eq 5 ]; then
            echo "No tests collected."
            exit 0
          fi
          exit $status
      - name: Run ruff (if available)
        run: |
          if command -v ruff >/dev/null 2>&1; then
            ruff check .
          else
            echo "ruff not installed; skipping."
          fi
      - name: Run pyright (if available)
        run: |
          if command -v pyright >/dev/null 2>&1; then
            pyright
          else
            echo "pyright not installed; skipping."
          fi
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check JavaScript syntax
        run: find frontend/js -name "*.js" -print0 | xargs -0 -n1 node --check
