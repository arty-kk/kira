name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pyright

      - name: Run checks
        run: bash scripts/check.sh

      - name: Validate deploy scale contract
        run: bash scripts/test_deploy_scales.sh

  compose-validate:
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for compose validation
        run: |
          cat <<'EOF' > .env
          POSTGRES_USER=test_user
          POSTGRES_PASSWORD=test_password
          POSTGRES_DB=test_db
          REDIS_PASSWORD=test_redis_password
          PGADMIN_DEFAULT_EMAIL=admin@example.com
          PGADMIN_DEFAULT_PASSWORD=test_pgadmin_password
          OPENAI_API_KEY=test_openai_api_key
          TELEGRAM_BOT_TOKEN=test_telegram_bot_token
          TELEGRAM_BOT_USERNAME=test_bot
          TELEGRAM_BOT_ID=123456789
          WEBHOOK_URL=https://example.com/webhook
          DATABASE_URL=postgresql://test_user:test_password@postgres:5432/test_db
          REDIS_URL=redis://:test_redis_password@redis:6379/0
          REDIS_URL_QUEUE=redis://:test_redis_password@redis:6379/1
          REDIS_URL_VECTOR=redis://:test_redis_password@redis:6379/2
          CELERY_BROKER_URL=redis://:test_redis_password@redis:6379/3
          EOF

      - name: Validate docker compose config
        run: docker compose config

      - name: Build core services
        run: docker compose build api bot migrate worker-tasks worker-moderation worker-media worker-queue worker-api

      - name: Cleanup compose resources
        if: always()
        run: docker compose down -v --remove-orphans
