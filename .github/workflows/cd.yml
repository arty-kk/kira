name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            export DEPLOY_BRANCH="${{ secrets.DEPLOY_BRANCH }}"
            export DEPLOY_REPO_URL="${{ secrets.DEPLOY_REPO_URL }}"
            if [[ -z "${DEPLOY_BRANCH}" ]]; then
              DEPLOY_BRANCH="main"
            fi
            DEPLOY_SCRIPT="${DEPLOY_PATH}/scripts/deploy.sh"
            export DEPLOY_COMMIT_SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}"
            export DB_SCALE="${{ secrets.DB_SCALE }}"
            export REDIS_KV_SCALE="${{ secrets.REDIS_KV_SCALE }}"
            export REDIS_VEC_SCALE="${{ secrets.REDIS_VEC_SCALE }}"
            export API_SCALE="${{ secrets.API_SCALE }}"
            export MIGRATE_SCALE="${{ secrets.MIGRATE_SCALE }}"
            export WORKER_TASKS_SCALE="${{ secrets.WORKER_TASKS_SCALE }}"
            export WORKER_MODERATION_SCALE="${{ secrets.WORKER_MODERATION_SCALE }}"
            export WORKER_MEDIA_SCALE="${{ secrets.WORKER_MEDIA_SCALE }}"
            export WORKER_QUEUE_SCALE="${{ secrets.WORKER_QUEUE_SCALE }}"
            export WORKER_API_SCALE="${{ secrets.WORKER_API_SCALE }}"
            export COMPOSE_SCALE_OVERRIDES="${{ secrets.COMPOSE_SCALE_OVERRIDES }}"
            if [[ ! -f "${DEPLOY_SCRIPT}" ]]; then
              if [[ -n "${DEPLOY_REPO_URL}" ]]; then
                if [[ -e "${DEPLOY_PATH}" ]] && [[ -n "$(ls -A "${DEPLOY_PATH}" 2>/dev/null)" ]]; then
                  echo "Bootstrap failed: '${DEPLOY_PATH}' is not empty. Refusing to clone '${DEPLOY_REPO_URL}' to avoid overwriting existing data. Clean the directory or set a different DEPLOY_PATH." >&2
                  exit 1
                fi

                mkdir -p "${DEPLOY_PATH}"
                git clone --branch "${DEPLOY_BRANCH}" --single-branch "${DEPLOY_REPO_URL}" "${DEPLOY_PATH}"

                if [[ ! -f "${DEPLOY_SCRIPT}" ]]; then
                  echo "Bootstrap failed: '${DEPLOY_SCRIPT}' was not found after cloning '${DEPLOY_REPO_URL}' (branch '${DEPLOY_BRANCH}')." >&2
                  exit 1
                fi
              else
                echo "Deploy failed: '${DEPLOY_SCRIPT}' not found and bootstrap is impossible without DEPLOY_REPO_URL." >&2
                exit 1
              fi
            fi

            bash "${DEPLOY_SCRIPT}"
